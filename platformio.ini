; PlatformIO project configuration for Button.
;
;   pio test -e native   -> run the native unit tests (mocks millis()/digitalRead())
;   pio run -e uno       -> compile-check against AVR (Arduino Uno)

[platformio]
src_dir = src

[env:native]
platform = native
lib_compat_mode = off
test_build_src = true
build_flags = -I test/mock

[env:uno]
platform = atmelavr
board = uno
framework = arduino
